schema {
  query: Query
  mutation: Mutation
  subscription: Subscription
}

# ============================================
# Scalars & Types
# ============================================

scalar AWSDateTime
scalar JSON

type Palace {
  id: ID!
  palaceId: String!
  userId: String!
  name: String!
  structure: PalaceStructure!
  createdAt: AWSDateTime!
  updatedAt: AWSDateTime!
  createdBy: String  # Agent ID that created it
}

type PalaceStructure {
  wings: [Wing!]!
}

type Wing {
  id: ID!
  name: String!
  rooms: [Room!]!
}

type Room {
  id: ID!
  name: String!
  halls: [Hall!]!
}

type Hall {
  id: ID!
  name: String!
  drawers: [Drawer!]!
}

type Drawer {
  id: ID!
  type: String!  # "alert" | "reasoning" | "finding" | "context" | "decision"
  content: String!
  vectorEmbedding: [Float]  # 384-dimensional from all-MiniLM-L6-v2
  metadata: JSON
  createdBy: String!  # Agent ID that wrote it
  createdAt: AWSDateTime!
  updatedAt: AWSDateTime!
}

type ConversationMessage {
  id: ID!
  conversationId: String!
  userId: String!
  role: String!  # "user" | "assistant" | "agent"
  content: String!
  palaceReads: [String!]  # Palace IDs queried
  palaceWrites: [PalaceWrite!]  # What was written back
  timestamp: AWSDateTime!
}

type PalaceWrite {
  palaceId: String!
  wing: String!
  room: String!
  hall: String!
  drawerId: String!
  content: String!
}

type AgentMemory {
  id: ID!
  agentId: String!
  currentContext: AgentContext!
  memorySnapshot: MemorySnapshot!
  collaboratingAgents: [String!]!
  timestamp: AWSDateTime!
  updatedAt: AWSDateTime!
}

type AgentContext {
  activePalaces: [String!]!
  lastAction: String!
  lastActionTime: AWSDateTime!
  currentTask: String
}

type MemorySnapshot {
  shortTerm: JSON!  # Last 5 interactions
  longTerm: JSON!  # Distilled learnings
}

type SearchResult {
  drawerId: String!
  palaceId: String!
  wing: String!
  room: String!
  hall: String!
  content: String!
  similarity: Float!  # 0.0 - 1.0
  createdBy: String!
  createdAt: AWSDateTime!
}

type AgentCollaborationEvent {
  eventId: ID!
  palaceId: String!
  triggeringDrawerId: String!
  triggeredAgents: [String!]!
  timestamp: AWSDateTime!
}

# ============================================
# Inputs
# ============================================

input DrawerInput {
  type: String!
  content: String!
  metadata: JSON
}

input MessageInput {
  role: String!
  content: String!
}

input PalaceWriteInput {
  palaceId: String!
  wing: String!
  room: String!
  hall: String!
  drawer: DrawerInput!
}

input AgentMemoryInput {
  agentId: String!
  currentContext: AgentContextInput!
  memorySnapshot: MemorySnapshotInput!
  collaboratingAgents: [String!]!
}

input AgentContextInput {
  activePalaces: [String!]!
  lastAction: String!
  currentTask: String
}

input MemorySnapshotInput {
  shortTerm: JSON!
  longTerm: JSON!
}

# ============================================
# Queries
# ============================================

type Query {
  # Get a palace by ID
  getPalace(id: ID!): Palace

  # Get all palaces for a user
  getUserPalaces(userId: String!): [Palace!]!

  # Semantic search within a palace
  searchPalace(
    palaceId: String!
    query: String!
    topK: Int = 5
  ): [SearchResult!]!

  # Get agent's active context
  getAgentContext(agentId: String!): AgentMemory

  # Get conversation history with palace context
  getConversation(conversationId: String!): [ConversationMessage!]!

  # Get last N messages of a conversation
  getConversationRecent(
    conversationId: String!
    limit: Int = 10
  ): [ConversationMessage!]!

  # Get agent collaboration history for a palace
  getCollaborationHistory(
    palaceId: String!
    limit: Int = 20
  ): [AgentCollaborationEvent!]!
}

# ============================================
# Mutations
# ============================================

type Mutation {
  # Create a new palace
  createPalace(
    userId: String!
    name: String!
    structure: JSON!
  ): Palace

  # Write data to a palace (primary operation)
  writeToPalace(
    palaceId: String!
    wing: String!
    room: String!
    hall: String!
    drawer: DrawerInput!
  ): Drawer!

  # Update an existing drawer
  updateDrawer(
    palaceId: String!
    drawerId: String!
    content: String!
    metadata: JSON
  ): Drawer!

  # Record a conversation message with palace context
  recordMessage(
    conversationId: String!
    userId: String!
    message: MessageInput!
    palaceReads: [String!]
    palaceWrites: [PalaceWriteInput!]
  ): ConversationMessage!

  # Update agent's memory state
  updateAgentMemory(
    agentId: String!
    memory: AgentMemoryInput!
  ): AgentMemory!

  # Declare which agents should collaborate on a palace
  setAgentSubscriptions(
    agentId: String!
    palaceIds: [String!]!
  ): [String!]!
}

# ============================================
# Subscriptions
# ============================================

type Subscription {
  # Real-time updates when palace is written to
  onPalaceWrite(palaceId: String!): Drawer
    @aws_subscribe(rules: [{ and: [{ operations: ["Mutation.writeToPalace"] }] }])

  # Real-time agent state changes
  onAgentStateChange(agentId: String!): AgentMemory
    @aws_subscribe(rules: [{ and: [{ operations: ["Mutation.updateAgentMemory"] }] }])

  # Real-time collaboration signals
  onAgentCollaboration(palaceId: String!): AgentCollaborationEvent
    @aws_subscribe(rules: [{ and: [{ operations: ["Mutation.writeToPalace"] }] }])

  # Real-time conversation updates
  onConversationMessage(conversationId: String!): ConversationMessage
    @aws_subscribe(rules: [{ and: [{ operations: ["Mutation.recordMessage"] }] }])
}
