<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Unimatrix Memory</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 380px;
      background: linear-gradient(135deg, #0e1030 0%, #1a1f3a 100%);
      color: #f1f5f9;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    .container {
      padding: 16px;
    }

    header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
      border-bottom: 1px solid rgba(255, 122, 0, 0.2);
      padding-bottom: 12px;
    }

    .logo {
      font-size: 20px;
      font-weight: bold;
    }

    .logo-text {
      color: #ff7a00;
    }

    h2 {
      font-size: 16px;
      margin-bottom: 12px;
    }

    .status {
      padding: 8px 12px;
      background: rgba(34, 197, 94, 0.1);
      border: 1px solid rgba(34, 197, 94, 0.3);
      border-radius: 6px;
      font-size: 12px;
      color: #22c55e;
      margin-bottom: 12px;
      display: none;
    }

    .status.active {
      display: block;
    }

    .status.error {
      background: rgba(239, 68, 68, 0.1);
      border-color: rgba(239, 68, 68, 0.3);
      color: #ef4444;
    }

    textarea {
      width: 100%;
      height: 80px;
      padding: 10px;
      background: #111827;
      border: 1px solid rgba(255, 122, 0, 0.2);
      border-radius: 6px;
      color: #f1f5f9;
      font-family: inherit;
      font-size: 13px;
      resize: vertical;
      margin-bottom: 12px;
    }

    textarea:focus {
      outline: none;
      border-color: #ff7a00;
      box-shadow: 0 0 0 2px rgba(255, 122, 0, 0.1);
    }

    .form-group {
      margin-bottom: 12px;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #94a3b8;
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    input[type="text"],
    select {
      width: 100%;
      padding: 8px;
      background: #111827;
      border: 1px solid rgba(255, 122, 0, 0.2);
      border-radius: 6px;
      color: #f1f5f9;
      font-size: 13px;
    }

    input[type="text"]:focus,
    select:focus {
      outline: none;
      border-color: #ff7a00;
      box-shadow: 0 0 0 2px rgba(255, 122, 0, 0.1);
    }

    .button-group {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }

    button {
      flex: 1;
      padding: 10px 16px;
      border: none;
      border-radius: 6px;
      font-weight: 600;
      cursor: pointer;
      font-size: 13px;
      transition: all 0.2s;
    }

    .btn-primary {
      background: #ff7a00;
      color: #0e1030;
    }

    .btn-primary:hover {
      background: #ff8a1a;
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(255, 122, 0, 0.3);
    }

    .btn-secondary {
      background: #1f2937;
      color: #f1f5f9;
      border: 1px solid rgba(255, 122, 0, 0.2);
    }

    .btn-secondary:hover {
      background: #374151;
      border-color: #ff7a00;
    }

    .btn-small {
      padding: 6px 12px;
      font-size: 12px;
      width: auto;
    }

    .memory-list {
      margin-top: 16px;
      padding-top: 12px;
      border-top: 1px solid rgba(255, 122, 0, 0.2);
    }

    .memory-item {
      padding: 8px;
      background: #1a1f3a;
      border-left: 3px solid #ff7a00;
      border-radius: 4px;
      font-size: 12px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .memory-item:hover {
      background: #252a45;
    }

    .memory-item .time {
      color: #94a3b8;
      font-size: 11px;
    }

    .login-section {
      text-align: center;
    }

    .login-section p {
      font-size: 12px;
      color: #94a3b8;
      margin-bottom: 12px;
    }

    .divider {
      text-align: center;
      font-size: 11px;
      color: #64748b;
      margin: 12px 0;
    }

    .settings-link {
      text-align: center;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid rgba(255, 122, 0, 0.2);
    }

    .settings-link a {
      color: #ff7a00;
      text-decoration: none;
      font-size: 12px;
    }

    .settings-link a:hover {
      text-decoration: underline;
    }

    .loader {
      display: inline-block;
      width: 12px;
      height: 12px;
      border: 2px solid rgba(255, 122, 0, 0.3);
      border-top-color: #ff7a00;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="logo">
        <span class="logo-text">UNI</span>MATRIX
      </div>
    </header>

    <!-- Authentication Status -->
    <div id="authStatus" class="status"></div>

    <!-- Save Memory Section -->
    <div id="mainContent" style="display: none;">
      <h2>💾 Save Memory</h2>

      <div class="form-group">
        <label>What to remember?</label>
        <textarea id="memoryContent" placeholder="Paste the conversation excerpt or key insight..."></textarea>
      </div>

      <div class="form-group">
        <label>Context</label>
        <input type="text" id="memoryContext" placeholder="e.g., Development, Learning, Research">
      </div>

      <div class="form-group">
        <label>Importance</label>
        <select id="memoryImportance">
          <option value="low">Low</option>
          <option value="medium" selected>Medium</option>
          <option value="high">High</option>
        </select>
      </div>

      <div class="button-group">
        <button class="btn-primary" id="saveBtn">
          <span id="saveBtnText">Save Memory</span>
        </button>
        <button class="btn-secondary btn-small" id="captureBtn">Auto-Capture</button>
      </div>

      <!-- Recent Memories -->
      <div class="memory-list" id="memoryList" style="display: none;">
        <h3 style="font-size: 12px; margin-bottom: 8px; color: #94a3b8;">Recent Saves</h3>
        <div id="recentMemories"></div>
      </div>
    </div>

    <!-- Login Section -->
    <div id="loginSection">
      <div class="login-section">
        <p>Sign in to save memories</p>
        <button class="btn-primary" style="width: 100%;" id="loginBtn">Sign In to Unimatrix</button>
        <div class="divider">or</div>
        <button class="btn-secondary" style="width: 100%;" id="signupBtn">Create Free Account</button>
      </div>
    </div>

    <!-- Settings Link -->
    <div class="settings-link">
      <a href="#" id="settingsLink">⚙️ Settings</a>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
