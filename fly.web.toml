# Fly.io config for the web service (Next.js custom server + Collab WS)
app = "unimatrix-web"
primary_region = "iad"   # Change to your preferred region (e.g. "ams", "sjc", "fra")

[build]
  dockerfile = "Dockerfile.web"

[env]
  NODE_ENV = "production"
  PORT = "8080"   # Fly usually routes to 8080; our server respects PORT

[[services]]
  protocol = "tcp"
  internal_port = 8080
  ports = [
    { port = 80, handlers = ["http"] },
    { port = 443, handlers = ["tls", "http"] }
  ]

[services.concurrency]
  type = "connections"
  hard_limit = 1000
  soft_limit = 500

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 1024   # Start here; increase for production (Collab WS + Next.js)

[checks]
  [checks.web]
    port = 8080
    type = "http"
    interval = "15s"
    timeout = "5s"
    grace_period = "10s"
    method = "get"
    path = "/api/health"
