# Fly.io config for the web service (Next.js standard server)
# Usage: cp fly.web.toml fly.toml && fly deploy --config fly.toml --app your-app-name
app = "unimatrix-web"
primary_region = "iad"   # Change to your preferred region (e.g. "ams", "sjc", "fra", "lhr")

[build]
  dockerfile = "Dockerfile.web"

[env]
  NODE_ENV = "production"
  PORT = "8080"   # Fly routes to 8080 internally; Next.js respects process.env.PORT

[[services]]
  protocol = "tcp"
  internal_port = 8080
  ports = [
    { port = 80, handlers = ["http"] },
    { port = 443, handlers = ["tls", "http"] }
  ]

[services.concurrency]
  type = "connections"
  hard_limit = 1000
  soft_limit = 500

[[vm]]
  cpu_kind = "performance"  # Better for performance
  cpus = 1
  memory_mb = 2048  # Fly minimum for performance VMs in some cases; was 1024

[checks]
  [checks.web]
    port = 8080
    type = "http"
    interval = "15s"
    timeout = "5s"
    grace_period = "10s"
    method = "get"
    path = "/api/health"
