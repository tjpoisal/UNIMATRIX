# Unimatrix — Render Blueprint (use when billing resolved)
# Deploys the full stack: PostgreSQL + Core MCP Server (Fastify) + Web Portal (Next.js + Collab WS)
#
# Current active target: Fly.io — see DEPLOYMENT.md, fly.web.toml / fly.mcp.toml / fly.worker.toml, and scripts/fly-deploy.sh
# This file is ready as alternative Blueprint.
#
# Usage (Render):
#   1. Push this file to main
#   2. In Render Dashboard → Blueprints → New Blueprint Instance
#   3. Connect this repo
#
# After first deploy, manually run migrations via the Shell tab if needed (or they run in startCommand):
#   pnpm --filter @unimatrix/server db:migrate:deploy
#   pnpm --filter web db:migrate:deploy
#
# DOCKER OPTION (recommended for full control):
#   - Change runtime to "docker" and add dockerfilePath
#   - See Dockerfile.server and Dockerfile.web in repo root
#   - Much better for native WebSocket + consistent builds

databases:
  - name: unimatrix-db
    plan: starter
    region: oregon
    # ipAllowList left empty so services in same region can connect

services:
  # ──────────────────────────────────────────────────────────────
  # 1. Core MCP Server (Fastify) — THE primary backend for LLMs
  #    Exposes /mcp, /health, /spaces, etc.
  # ──────────────────────────────────────────────────────────────
  - type: web
    name: unimatrix-mcp
    runtime: node
    plan: standard
    region: oregon
    rootDirectory: .
    buildCommand: |
      pnpm install --frozen-lockfile
      pnpm --filter @unimatrix/db build
      pnpm --filter @unimatrix/server build
      pnpm --filter @unimatrix/server db:generate
    startCommand: (pnpm --filter @unimatrix/server db:migrate:deploy || pnpm --filter @unimatrix/server exec prisma db push --skip-generate --accept-data-loss || true) && pnpm --filter @unimatrix/server start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: unimatrix-db
          property: connectionString
      - key: DIRECT_URL
        fromDatabase:
          name: unimatrix-db
          property: connectionString
      # Clerk (used by MCP server for token verification)
      - key: CLERK_SECRET_KEY
        sync: false
      - key: CLERK_WEBHOOK_SECRET
        sync: false
      # AI / Embeddings
      - key: VOYAGE_API_KEY
        sync: false
      - key: MASTER_ENCRYPTION_KEY
        sync: false
      # Optional: Svix for webhooks if used
      - key: SVIX_API_KEY
        sync: false

  # ──────────────────────────────────────────────────────────────
  # 2. Web Portal + Collab Room (Next.js + custom WS server)
  #    Dashboard, auth, memory browser, future multi-LLM room
  # ──────────────────────────────────────────────────────────────
  - type: web
    name: unimatrix-web
    runtime: node
    plan: standard
    region: oregon
    rootDirectory: .
    buildCommand: |
      pnpm install --frozen-lockfile
      pnpm --filter @unimatrix/db build
      pnpm --filter web build
    startCommand: pnpm --filter web db:migrate:deploy && pnpm --filter web start:prod
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: unimatrix-db
          property: connectionString
      - key: DIRECT_URL
        fromDatabase:
          name: unimatrix-db
          property: connectionString
      # NextAuth (web uses NextAuth, MCP server uses Clerk — technical debt)
      - key: NEXTAUTH_SECRET
        sync: false
      - key: NEXTAUTH_URL
        value: https://unimatrix-web.onrender.com
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GITHUB_CLIENT_ID
        sync: false
      - key: GITHUB_CLIENT_SECRET
        sync: false
      # Email
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        value: Unimatrix <onboarding@resend.dev>
      # Payments
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY
        sync: false

  # ──────────────────────────────────────────────────────────────
  # DOCKER-BASED ALTERNATIVES (uncomment to use instead of native Node)
  # Better for consistent builds, native WebSockets, and self-hosting parity
  # ──────────────────────────────────────────────────────────────
  # - type: web
  #   name: unimatrix-mcp
  #   runtime: docker
  #   plan: standard
  #   dockerfilePath: ./Dockerfile.server
  #   healthCheckPath: /health
  #   envVars: [ ... same as above ... ]

  # - type: web
  #   name: unimatrix-web
  #   runtime: docker
  #   plan: standard
  #   dockerfilePath: ./Dockerfile.web
  #   healthCheckPath: /api/health
  #   envVars: [ ... same as above ... ]

  # ──────────────────────────────────────────────────────────────
  # Background Worker for Librarian / Embedding Jobs (AgentRun polling)
  # Runs the async semantic processing from packages/server/src/librarian/processJob.ts
  # and updates AgentRun tracking. Optional but recommended for production scale.
  # ──────────────────────────────────────────────────────────────
  # Native node example (uncomment + adjust):
  # - type: worker
  #   name: unimatrix-worker
  #   runtime: node
  #   plan: standard
  #   region: oregon
  #   rootDirectory: .
  #   buildCommand: |
  #     pnpm install --frozen-lockfile
  #     pnpm --filter @unimatrix/db build
  #     pnpm --filter @unimatrix/server build
  #   startCommand: node packages/server/dist/worker.js
  #   envVars:
  #     - key: DATABASE_URL
  #       fromDatabase:
  #         name: unimatrix-db
  #         property: connectionString
  #     - key: VOYAGE_API_KEY
  #       sync: false
  #     - key: MASTER_ENCRYPTION_KEY
  #       sync: false
  #     # CLERK etc not needed for pure worker

  # Docker alternative (recommended for parity with Dockerfile.server which runs psql inits):
  # - type: worker
  #   name: unimatrix-worker
  #   runtime: docker
  #   plan: standard
  #   dockerfilePath: ./Dockerfile.server
  #   # Override the default CMD to run the worker entry instead of server
  #   dockerCommand: node dist/worker.js
  #   envVars: [ same as above; DATABASE_URL + VOYAGE + MASTER_ENCRYPTION_KEY required ]

