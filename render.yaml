# Unimatrix — Render Blueprint
# Deploys the full stack: PostgreSQL + Core MCP Server (Fastify) + Web Portal (Next.js + Collab WS)
#
# Usage:
#   1. Push this file to main
#   2. In Render Dashboard → Blueprints → New Blueprint Instance
#   3. Connect this repo
#
# After first deploy, manually run migrations via the Shell tab if needed:
#   pnpm --filter server db:migrate:deploy
#   pnpm --filter web db:migrate:deploy

databases:
  - name: unimatrix-db
    plan: starter
    region: oregon
    # ipAllowList left empty so services in same region can connect

services:
  # ──────────────────────────────────────────────────────────────
  # 1. Core MCP Server (Fastify) — THE primary backend for LLMs
  #    Exposes /mcp, /health, /spaces, etc.
  # ──────────────────────────────────────────────────────────────
  - type: web
    name: unimatrix-mcp
    runtime: node
    plan: standard
    region: oregon
    rootDirectory: .
    buildCommand: |
      pnpm install --frozen-lockfile
      pnpm --filter server build
      pnpm --filter server db:generate
    startCommand: pnpm --filter server db:migrate:deploy && pnpm --filter server start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: unimatrix-db
          property: connectionString
      - key: DIRECT_URL
        fromDatabase:
          name: unimatrix-db
          property: connectionString
      # Clerk (used by MCP server for token verification)
      - key: CLERK_SECRET_KEY
        sync: false
      - key: CLERK_WEBHOOK_SECRET
        sync: false
      # AI / Embeddings
      - key: VOYAGE_API_KEY
        sync: false
      - key: MASTER_ENCRYPTION_KEY
        sync: false
      # Optional: Svix for webhooks if used
      - key: SVIX_API_KEY
        sync: false

  # ──────────────────────────────────────────────────────────────
  # 2. Web Portal + Collab Room (Next.js + custom WS server)
  #    Dashboard, auth, memory browser, future multi-LLM room
  # ──────────────────────────────────────────────────────────────
  - type: web
    name: unimatrix-web
    runtime: node
    plan: standard
    region: oregon
    rootDirectory: .
    buildCommand: |
      pnpm install --frozen-lockfile
      pnpm --filter web build
    startCommand: pnpm --filter web db:migrate:deploy && pnpm --filter web start:prod
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: unimatrix-db
          property: connectionString
      - key: DIRECT_URL
        fromDatabase:
          name: unimatrix-db
          property: connectionString
      # NextAuth (web uses NextAuth, MCP server uses Clerk — technical debt)
      - key: NEXTAUTH_SECRET
        sync: false
      - key: NEXTAUTH_URL
        value: https://unimatrix-web.onrender.com
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GITHUB_CLIENT_ID
        sync: false
      - key: GITHUB_CLIENT_SECRET
        sync: false
      # Email
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        value: Unimatrix <onboarding@resend.dev>
      # Payments
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY
        sync: false

  # Optional: Future background worker for librarian jobs (embeddings, summarization)
  # - type: worker
  #   name: unimatrix-worker
  #   ...
