version: 2

updates:
  # Root workspace (pnpm)
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      non-breaking:
        update-types:
          - minor
          - patch

  # Web app
  - package-ecosystem: npm
    directory: /apps/web
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    ignore:
      # Keep Next.js upgrades manual — major changes need testing
      - dependency-name: next
        update-types: [version-update:semver-major]
    groups:
      non-breaking:
        update-types:
          - minor
          - patch

  # Mobile app
  - package-ecosystem: npm
    directory: /apps/mobile
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    ignore:
      # Transitive uuid<11 via old xcode in Expo config chain (moderate buffer vuln).
      # Override at root + not present in prod web/runtime. Dismiss GitHub alerts for this.
      - dependency-name: "uuid"
    groups:
      non-breaking:
        update-types:
          - minor
          - patch

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
