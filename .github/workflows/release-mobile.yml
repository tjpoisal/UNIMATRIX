name: Release Mobile (EAS)

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build-ios:
    name: iOS (.ipa via EAS)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build iOS (EAS via pnpm alias for correct CWD + bins)
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EAS_BUILD_NO_EXPO_GO_WARNING: 'true'
          EXPO_NO_TELEMETRY: '1'
        run: pnpm mobile:build:ios

  build-android:
    name: Android (.aab via EAS)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Android (EAS via pnpm alias for correct CWD + bins)
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EAS_BUILD_NO_EXPO_GO_WARNING: 'true'
          EXPO_NO_TELEMETRY: '1'
        run: pnpm mobile:build:android
