name: Release Mobile (EAS)

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build-ios:
    name: iOS (.ipa via EAS)
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        # version omitted to auto-detect from package.json "packageManager" field
        # (prevents "Multiple versions of pnpm specified" error from the action)

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Install dependencies (workspace)
        run: pnpm install --frozen-lockfile

      - name: Build iOS (EAS)
        working-directory: apps/mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: eas build --platform ios --profile production --non-interactive

  build-android:
    name: Android (.aab via EAS)
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        # version omitted to auto-detect from package.json "packageManager" field
        # (prevents "Multiple versions of pnpm specified" error from the action)

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Install dependencies (workspace)
        run: pnpm install --frozen-lockfile

      - name: Build Android (EAS)
        working-directory: apps/mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: eas build --platform android --profile production --non-interactive
