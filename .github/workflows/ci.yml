name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typecheck-build:
    name: Typecheck & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace packages (for types + entrypoints, e.g. @unimatrix/db)
        run: pnpm --filter @unimatrix/db build

      - name: Generate Prisma client
        working-directory: apps/web
        run: pnpm exec prisma generate
        env:
          DATABASE_URL: postgresql://placeholder:placeholder@localhost/placeholder

      - name: Typecheck (web + root monorepo)
        working-directory: apps/web
        run: pnpm exec tsc --noEmit --skipLibCheck
        env:
          DATABASE_URL: postgresql://placeholder:placeholder@localhost/placeholder
          NEXTAUTH_SECRET: ci-secret-32-chars-minimum-length-x
          NEXTAUTH_URL: http://localhost:3000

      - name: Lint (turbo monorepo)
        run: pnpm lint

      - name: Typecheck (root)
        run: pnpm type-check
        env:
          DATABASE_URL: postgresql://placeholder:placeholder@localhost/placeholder
          NEXTAUTH_SECRET: ci-secret-32-chars-minimum-length-x
          NEXTAUTH_URL: http://localhost:3000

      - name: Build (web)
        working-directory: apps/web
        run: pnpm build
        env:
          DATABASE_URL: postgresql://placeholder:placeholder@localhost/placeholder
          NEXTAUTH_SECRET: ci-secret-32-chars-minimum-length-x
          NEXTAUTH_URL: http://localhost:3000
          RESEND_API_KEY: re_placeholder
          EMAIL_FROM: noreply@example.com
          STRIPE_SECRET_KEY: sk_test_placeholder
          STRIPE_WEBHOOK_SECRET: whsec_placeholder
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: pk_test_placeholder

  lint:
    name: Lint (non-blocking)
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: cd apps/web && pnpm lint

  typecheck-server:
    name: Typecheck server (non-blocking / experimental)
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace packages (for types, e.g. @unimatrix/db)
        run: pnpm --filter @unimatrix/db build

      - name: Typecheck @unimatrix/server
        run: NODE_OPTIONS="--max-old-space-size=8192" pnpm --filter @unimatrix/server exec tsc --noEmit
        env:
          DATABASE_URL: postgresql://placeholder:placeholder@localhost/placeholder
          CLERK_SECRET_KEY: sk_placeholder
          CLERK_WEBHOOK_SECRET: whsec_placeholder

  desktop-smoke:
    name: Desktop smoke (pack, non-blocking)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install (npm, since desktop is standalone)
        working-directory: apps/desktop
        run: npm install --no-audit --no-fund
      - name: Smoke pack (linux dir, no signing needed)
        working-directory: apps/desktop
        run: npm run pack -- --linux --dir
      - name: Verify output exists
        run: ls -l apps/desktop/dist/linux-unpacked/ || ls apps/desktop/dist/ || echo "pack produced output dir"
