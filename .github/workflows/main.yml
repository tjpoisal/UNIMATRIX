name: Release artifacts
on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
      - name: Install deps
        run: pnpm install
      - name: Build web & desktop (adapt to your scripts)
        run: |
          pnpm run build:web
          # build desktop artifacts (electron-builder / packager)
          # pnpm run build:desktop
      - name: Create GitHub Release
        id: release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
      - name: Upload release artifacts
        uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/*.dmg
            dist/*.AppImage
            dist/*.exe
