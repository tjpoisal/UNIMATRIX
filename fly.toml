# Fly.io config for the core MCP server (Fastify) - what LLMs connect to
# Usage: cp fly.mcp.toml fly.toml && fly deploy --config fly.toml --app your-mcp-app-name
app = "unimatrix-mcp"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile.server"

[env]
  NODE_ENV = "production"
  PORT = "8080"

[[services]]
  protocol = "tcp"
  internal_port = 8080
  ports = [
    { port = 80, handlers = ["http"] },
    { port = 443, handlers = ["tls", "http"] }
  ]

[services.concurrency]
  type = "connections"
  hard_limit = 500
  soft_limit = 300

[[vm]]
  cpu_kind = "performance"  # Best for low-latency MCP calls from LLMs
  cpus = 2
  memory_mb = 2048  # More for embeddings/processing if needed

[checks]
  [checks.mcp]
    port = 8080
    type = "http"
    interval = "15s"
    timeout = "5s"
    grace_period = "10s"
    method = "get"
    path = "/health"
