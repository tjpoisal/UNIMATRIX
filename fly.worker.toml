# Fly.io config for the background worker (librarian jobs, embeddings, AgentRun processing)
# Deploy as a separate cheap/low-resource app.
# Usage example:
#   cp fly.worker.toml fly.toml
#   fly apps create unimatrix-worker
#   fly deploy --config fly.toml --app unimatrix-worker
#   fly secrets set ... (same as mcp: DATABASE_URL, VOYAGE etc.)
# Then run the worker process (it will loop forever):
#   fly console --app unimatrix-worker
#   # inside container: node dist/worker.js

app = "unimatrix-worker"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile.server"

[env]
  NODE_ENV = "production"
  PORT = "8080"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512   # Worker is background, keep cheap; scale machines if backlog

# No public services needed for a pure worker
# It will just run the process in the machine

[processes]
  worker = "node dist/worker.js"

[deploy]
  strategy = "immediate"  # Workers don't need rolling deploys
